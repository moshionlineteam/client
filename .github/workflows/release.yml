name: Build & Release Electron App

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    name: Generate Version Tag
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(jq -r ".version" package.json)
          TAG="v$VERSION"
          echo "version=$TAG" >> $GITHUB_OUTPUT


  build:
    name: Build Release Artifacts (${{ matrix.target }})
    needs: tag
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            build_script: make:linux-x64
          - os: ubuntu-latest
            target: linux-ia32
            build_script: make:linux-ia32
          - os: windows-latest
            target: windows-x64
            build_script: make:win32-x64
          - os: windows-latest
            target: windows-ia32
            build_script: make:win32-ia32
          - os: macos-latest
            target: macos-x64
            build_script: make:macos-x64
          - os: macos-latest
            target: macos-arm64
            build_script: make:macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16

      - name: Setup Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Setup MSBuild (Windows)
        if: startsWith(matrix.os, 'windows')
        uses: microsoft/setup-msbuild@v1.1

      - name: Install dependencies
        run: npm ci --force

      - name: Build (electron forge)
        run: npm run ${{ matrix.build_script }}

      - name: List generated targets
        shell: bash
        run: |
          echo "Generated files under out/make:"
          find out/make -type f | sort || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.target }}-artifacts-${{ needs.tag.outputs.version }}"
          path: out/make/**/*
          if-no-files-found: error
